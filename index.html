<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ripunandan Kumar Editor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0f172a;
    color: #fff;
}

/* Header */
header {
    background: linear-gradient(90deg, #0ea5e9, #00ffcc);
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 1px;
    color: #000;
}

/* Layout */
.container {
    display: flex;
    height: calc(100vh - 60px);
}

/* Sidebar */
.sidebar {
    width: 200px;
    background: #020617;
    padding: 20px;
    border-right: 1px solid #1e293b;
}

.sidebar h3 {
    margin-bottom: 15px;
}

.sidebar button {
    width: 100%;
    margin-bottom: 10px;
    padding: 10px;
    border: none;
    background: #0ea5e9;
    color: #fff;
    cursor: pointer;
    border-radius: 6px;
}

.sidebar button:hover {
    background: #0284c7;
}

/* Editors */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.editors {
    display: flex;
    height: 50%;
}

textarea {
    flex: 1;
    background: #020617;
    color: #00ffcc;
    border: none;
    padding: 10px;
    font-size: 14px;
    resize: none;
    outline: none;
}

/* Labels */
.label {
    padding: 5px;
    font-size: 12px;
    background: #111827;
    text-align: center;
}

/* Preview */
iframe {
    height: 50%;
    width: 100%;
    border: none;
    background: #fff;
}

/* Topbar */
.topbar {
    display: flex;
    justify-content: flex-end;
    padding: 10px;
    background: #020617;
}

.topbar button {
    margin-left: 10px;
    padding: 8px 15px;
    border: none;
    background: #00ffcc;
    cursor: pointer;
    border-radius: 5px;
    font-weight: bold;
}

.topbar button:hover {
    background: #00ccaa;
}
</style>
</head>

<body>

<header>Ripunandan Kumar Editor</header>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>Tools</h3>
        <button onclick="runCode()">Run Code</button>
        <button onclick="clearCode()">Clear All</button>
    </div>

    <!-- Main -->
    <div class="main">

        <div class="topbar">
            <button onclick="runCode()">▶ Run</button>
            <button onclick="clearCode()">🗑 Clear</button>
        </div>

        <!-- Editors -->
        <div class="editors">

            <div style="flex:1; display:flex; flex-direction:column;">
                <div class="label">HTML</div>
                <textarea id="html">
<h1>Hello World</h1>
<p>Welcome to Ripunandan Kumar Editor</p>
                </textarea>
            </div>

            <div style="flex:1; display:flex; flex-direction:column;">
                <div class="label">CSS</div>
                <textarea id="css">
body {
    background: #f0f0f0;
    text-align: center;
}
                </textarea>
            </div>

            <div style="flex:1; display:flex; flex-direction:column;">
                <div class="label">JavaScript</div>
                <textarea id="js">
console.log("Editor Loaded");
                </textarea>
            </div>

        </div>

        <!-- Output -->
        <iframe id="output"></iframe>

    </div>

</div>

<script>
function runCode() {
    let html = document.getElementById("html").value;
    let css = "<style>" + document.getElementById("css").value + "</style>";
    let js = "<script>" + document.getElementById("js").value + "<\/script>";

    let output = document.getElementById("output").contentWindow.document;
    output.open();
    output.write(html + css + js);
    output.close();
}

function clearCode() {
    document.getElementById("html").value = "";
    document.getElementById("css").value = "";
    document.getElementById("js").value = "";
}
</script>

</body>
  </html>
