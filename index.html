<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ripunandan Kumar Editor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background: linear-gradient(135deg,#0f172a,#020617);
    color:#fff;
}

/* HEADER */
header{
    padding:15px;
    text-align:center;
    font-size:24px;
    font-weight:700;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-bottom:1px solid rgba(255,255,255,0.1);
}

/* HERO */
.hero{
    text-align:center;
    padding:50px 20px;
}

.hero h1{
    font-size:40px;
    background: linear-gradient(90deg,#00ffcc,#0ea5e9);
    -webkit-background-clip:text;
    color:transparent;
}

.hero p{
    margin-top:10px;
    color:#aaa;
}

/* BUTTON */
.hero button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    background:#00ffcc;
    color:#000;
    font-weight:bold;
    border-radius:8px;
    cursor:pointer;
}

.hero button:hover{
    background:#00ccaa;
}

/* EDITOR SECTION */
.editor-section{
    padding:20px;
}

.editor-container{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.box{
    flex:1;
    min-width:250px;
    background: rgba(255,255,255,0.05);
    border-radius:10px;
    overflow:hidden;
}

.label{
    background:#111827;
    padding:8px;
    text-align:center;
    font-size:13px;
}

textarea{
    width:100%;
    height:200px;
    background:#020617;
    color:#00ffcc;
    border:none;
    padding:10px;
    resize:none;
}

/* RUN BUTTON */
.run-btn{
    margin:20px 0;
    padding:12px;
    width:100%;
    background:#00ffcc;
    border:none;
    font-weight:bold;
    border-radius:8px;
    cursor:pointer;
}

.run-btn:hover{
    background:#00ccaa;
}

/* OUTPUT */
iframe{
    width:100%;
    height:300px;
    background:#fff;
    border:none;
    border-radius:10px;
}
</style>
</head>

<body>

<header>Ripunandan Kumar Editor</header>

<section class="hero">
    <h1>Premium Code Editor</h1>
    <p>Create & Run HTML, CSS, JS instantly</p>
    <button onclick="scrollToEditor()">Start Coding</button>
</section>

<section class="editor-section" id="editor">

    <div class="editor-container">

        <div class="box">
            <div class="label">HTML</div>
            <textarea id="html"><h1>Hello World</h1></textarea>
        </div>

        <div class="box">
            <div class="label">CSS</div>
            <textarea id="css">body { text-align:center; }</textarea>
        </div>

        <div class="box">
            <div class="label">JavaScript</div>
            <textarea id="js">console.log("Hello");</textarea>
        </div>

    </div>

    <button class="run-btn" onclick="runCode()">▶ Run Code</button>

    <iframe id="output"></iframe>

</section>

<script>
function runCode(){
    let html = document.getElementById("html").value;
    let css = "<style>"+document.getElementById("css").value+"</style>";
    let js = "<script>"+document.getElementById("js").value+"<\/script>";

    let output = document.getElementById("output").contentWindow.document;
    output.open();
    output.write(html + css + js);
    output.close();
}

function scrollToEditor(){
    document.getElementById("editor").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
